# ==========================================
# 站点基本信息 
# ==========================================
site_name: 镜神的知识网络
site_description: 连接思维的节点，构建第二大脑

# 部署地址：
site_url: https://qingyaozhuozhang.github.io/
# 源码仓库地址：
repo_url: https://github.com/qingyaozhuozhang/qingyaozhuozhang.github.io
repo_name: GitHub

# ==========================================
# 主题配置 (Design by Gemini: Modern Minimalist)
# ==========================================
theme:
  name: material
  language: zh
  logo: 1.png      # 默认占位，后续由JS随机替换
  favicon: 2.png   # 默认占位，后续由JS随机替换

  features:
    - navigation.tabs           # 顶级菜单栏
    - navigation.tabs.sticky    # 菜单栏吸顶 (配合 CSS 实现毛玻璃)
    - navigation.sections       # 侧边栏分组
    - navigation.expand         # 默认展开
    - navigation.top            # 回到顶部按钮
    - navigation.tracking       # 滚动锚点定位
    - navigation.indexes        # 目录索引支持
    - toc.follow                # 右侧目录自动跟随
    - search.suggest            # 搜索智能建议
    - search.share              # 搜索分享
    - search.highlight          # 搜索关键词高亮
    - content.code.copy         # 代码块复制按钮
    - content.action.edit       # 页面编辑按钮
    - content.tooltips          # 提示词支持

  palette:
    # 1. 亮色模式：纯净白 + 靛蓝
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white          
      accent: indigo          
      toggle:
        icon: material/weather-sunny
        name: 切换至深色模式

    # 2. 深色模式：板岩灰 + 靛蓝
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black          
      accent: indigo
      toggle:
        icon: material/weather-night
        name: 切换至镜神模式
    
    # 3. 镜神模式：专属桌宠开关 (已去除了背景图片)
    - scheme: jingshen
      primary: white          
      accent: deep-purple     
      toggle:
        icon: material/star-face 
        name: 切换至亮色模式

  font:
    text: "Noto Sans SC"      
    code: "JetBrains Mono"    

# ==========================================
# 额外 CSS 配置
# ==========================================
extra_css:
  - stylesheets/extra.css

# ==========================================
# 插件配置
# ==========================================
plugins:
  - search
  - git-revision-date-localized:
      type: date             
      locale: zh             
      enable_creation_date: false 
      fallback_to_build_date: true 
  - minify:                  
      minify_html: true

# ==========================================
# Markdown 扩展
# ==========================================
markdown_extensions:
  - admonition               
  - pymdownx.details         
  - attr_list                
  - md_in_html
  - pymdownx.superfences:    
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:      
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tasklist:       
      custom_checkbox: true
  - pymdownx.arithmatex:     
      generic: true
  - pymdownx.emoji:          
      emoji_index: !!python/name:materialx.emoji.twemoji
      emoji_generator: !!python/name:materialx.emoji.to_svg

# ==========================================
# 额外脚本
# ==========================================
extra_javascript:
  - javascripts/mathjax.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
  - javascripts/jingshen.js  # 引入交互脚本

